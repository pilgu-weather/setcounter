services:
  - type: web
    name: set-counter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: set-counter-db
          property: connectionString
databases:
  - name: set-counter-db
    plan: free
